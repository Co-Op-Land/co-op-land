<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>STOMP WebSocket 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>STOMP WebSocket 연결 테스트</h2>

<label for="tokenInput">토큰 입력:</label>
<input type="text" id="tokenInput" style="width: 500px;" placeholder="여기에 JWT 토큰을 입력하세요" />
<button onclick="connect()">Connect</button>

<script>
    function connect() {
        const token = document.getElementById("tokenInput").value.trim();
        if (!token) {
            alert("토큰을 입력하세요!");
            return;
        }

        const socket = new SockJS('http://localhost:7070/ws?token=' + token);
        const stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            console.log('STOMP 연결 성공!', frame);
            alert('연결 성공!');
        }, function(error) {
            console.error('연결 실패:', error);
            alert('연결 실패! 콘솔 로그 확인');
        });
    }
</script>
</body>
</html>
